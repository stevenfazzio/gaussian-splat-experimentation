<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaussian Splat Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    canvas { display: block; }

    #overlay {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #ccc;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
      z-index: 10;
    }
    #overlay h1 { font-size: 16px; color: #fff; margin-bottom: 4px; }
    #overlay .controls { opacity: 0.7; }

    #drop-zone {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.9);
      border: 3px dashed #6c63ff;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #drop-zone.active { display: flex; }
    #drop-zone p { color: #fff; font-size: 24px; }

    #loading {
      position: fixed;
      bottom: 16px;
      left: 16px;
      color: #6c63ff;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>Gaussian Splat Viewer</h1>
  <div class="controls">
    Drag to orbit | Scroll to zoom | Right-drag to pan<br>
    Drop a .ply / .splat / .spz file to load it
  </div>
</div>

<div id="drop-zone"><p>Drop splat file here</p></div>
<div id="loading"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
    }
  }
</script>

<script type="module">
  import * as THREE from "three";
  import { OrbitControls } from "three/addons/controls/OrbitControls.js";
  import { SplatMesh } from "@sparkjsdev/spark";

  // --- Scene setup ---
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1, 4);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.rotateSpeed = 0.35;
  controls.target.set(0, 0, 0);

  // --- Resize handling ---
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // --- Loading indicator ---
  const loadingEl = document.getElementById("loading");
  function showLoading(msg) { loadingEl.textContent = msg; }
  function hideLoading() { loadingEl.textContent = ""; }

  // --- Splat management ---
  let currentSplat = null;

  function removeSplat() {
    if (currentSplat) {
      scene.remove(currentSplat);
      currentSplat.dispose();
      currentSplat = null;
    }
  }

  function addSplat(splatMesh) {
    removeSplat();
    currentSplat = splatMesh;
    scene.add(splatMesh);
  }

  async function loadFromURL(url) {
    showLoading(`Loading: ${url.split("/").pop()}...`);
    try {
      const opts = { url };
      // Help Spark detect format for ambiguous extensions
      if (url.endsWith(".splat")) opts.fileType = "splat";
      else if (url.endsWith(".ksplat")) opts.fileType = "ksplat";
      const splat = new SplatMesh(opts);
      addSplat(splat);
      hideLoading();
    } catch (e) {
      showLoading(`Error: ${e.message}`);
      console.error(e);
    }
  }

  async function loadFromFile(file) {
    showLoading(`Loading: ${file.name}...`);
    try {
      const arrayBuffer = await file.arrayBuffer();
      const opts = { fileBytes: new Uint8Array(arrayBuffer) };
      // Detect file type from extension
      const ext = file.name.split(".").pop().toLowerCase();
      if (["splat", "ksplat", "ply", "spz"].includes(ext)) {
        opts.fileType = ext;
      }
      const splat = new SplatMesh(opts);
      addSplat(splat);
      hideLoading();
    } catch (e) {
      showLoading(`Error: ${e.message}`);
      console.error(e);
    }
  }

  // --- Drag and drop ---
  const dropZone = document.getElementById("drop-zone");
  let dragCounter = 0;

  document.addEventListener("dragenter", (e) => {
    e.preventDefault();
    dragCounter++;
    dropZone.classList.add("active");
  });

  document.addEventListener("dragleave", (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter === 0) dropZone.classList.remove("active");
  });

  document.addEventListener("dragover", (e) => e.preventDefault());

  document.addEventListener("drop", (e) => {
    e.preventDefault();
    dragCounter = 0;
    dropZone.classList.remove("active");
    const file = e.dataTransfer.files[0];
    if (file) loadFromFile(file);
  });

  // --- Load initial splat ---
  const params = new URLSearchParams(window.location.search);
  const splatUrl = params.get("url") || "https://sparkjs.dev/assets/splats/butterfly.spz";

  // Set up camera from cameras.json
  async function setupCamera(splatUrl) {
    if (splatUrl.startsWith("http") && !splatUrl.startsWith("http://localhost")) return;
    const dir = splatUrl.substring(0, splatUrl.lastIndexOf("/") + 1);
    try {
      const resp = await fetch(dir + "cameras.json");
      if (!resp.ok) return;
      const cameras = await resp.json();
      if (!Array.isArray(cameras) || cameras.length === 0) return;

      // Use first camera's exact position
      camera.position.set(...cameras[0].position);

      // Camera centroid
      let cx = 0, cy = 0, cz = 0;
      for (const c of cameras) {
        cx += c.position[0]; cy += c.position[1]; cz += c.position[2];
      }
      cx /= cameras.length; cy /= cameras.length; cz /= cameras.length;

      // Gaze intersection — least-squares closest point to all camera forward rays
      const A = [[0,0,0],[0,0,0],[0,0,0]];
      const b = [0, 0, 0];
      for (const c of cameras) {
        const Rc = c.rotation;
        const p = c.position;
        const d = [Rc[0][2], Rc[1][2], Rc[2][2]];
        const dlen = Math.sqrt(d[0]*d[0] + d[1]*d[1] + d[2]*d[2]);
        d[0] /= dlen; d[1] /= dlen; d[2] /= dlen;
        for (let i = 0; i < 3; i++) {
          for (let j = 0; j < 3; j++) {
            const Pij = (i === j ? 1 : 0) - d[i] * d[j];
            A[i][j] += Pij;
            b[i] += Pij * p[j];
          }
        }
      }
      function det3(m) {
        return m[0][0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1])
             - m[0][1]*(m[1][0]*m[2][2]-m[1][2]*m[2][0])
             + m[0][2]*(m[1][0]*m[2][1]-m[1][1]*m[2][0]);
      }
      function replaceCol(m, col, v) {
        return m.map((row, i) => row.map((val, j) => j === col ? v[i] : val));
      }
      const detA = det3(A);
      if (Math.abs(detA) < 1e-10) return; // degenerate camera arrangement
      const gazeX = det3(replaceCol(A, 0, b)) / detA;
      const gazeY = det3(replaceCol(A, 1, b)) / detA;
      const gazeZ = det3(replaceCol(A, 2, b)) / detA;

      // Target: prefer scene-info.json (PLY-derived center), fall back to gaze intersection
      let targetX = gazeX, targetY = gazeY, targetZ = gazeZ;
      try {
        const infoResp = await fetch(dir + "scene-info.json");
        if (infoResp.ok) {
          const info = await infoResp.json();
          [targetX, targetY, targetZ] = info.center;
        }
      } catch (e) { /* use gaze intersection */ }
      controls.target.set(targetX, targetY, targetZ);

      // Up = direction from gaze point toward camera centroid
      const ux = cx - gazeX, uy = cy - gazeY, uz = cz - gazeZ;
      const ulen = Math.sqrt(ux*ux + uy*uy + uz*uz);
      if (ulen < 1e-10) return; // centroid coincides with gaze point
      camera.up.set(ux/ulen, uy/ulen, uz/ulen);

      controls.update();

      // --- Debug visualization ---
      const t = controls.target.clone();

      // Orbit target (white sphere)
      const targetSphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.05),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      targetSphere.position.copy(t);
      scene.add(targetSphere);

      // Up axis (green line)
      const dbLen = 0.8;
      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          t.clone().addScaledVector(camera.up, -dbLen),
          t.clone().addScaledVector(camera.up, dbLen)
        ]),
        new THREE.LineBasicMaterial({ color: 0x00ff00 })
      ));

      // X axis (red), Y axis (yellow), Z axis (blue)
      for (const [dir, color] of [
        [[dbLen,0,0], 0xff0000], [[0,dbLen,0], 0xffff00], [[0,0,dbLen], 0x0000ff]
      ]) {
        scene.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            t.clone().sub(new THREE.Vector3(...dir)),
            t.clone().add(new THREE.Vector3(...dir))
          ]),
          new THREE.LineBasicMaterial({ color })
        ));
      }

      // Camera positions (cyan dots)
      for (const cam of cameras) {
        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(0.02),
          new THREE.MeshBasicMaterial({ color: 0x00ffff })
        );
        dot.position.set(...cam.position);
        scene.add(dot);
      }

      // Camera centroid (magenta sphere)
      const centroidSphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.04),
        new THREE.MeshBasicMaterial({ color: 0xff00ff })
      );
      centroidSphere.position.set(cx, cy, cz);
      scene.add(centroidSphere);

      // Gaze intersection (orange sphere)
      const gazeSphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.04),
        new THREE.MeshBasicMaterial({ color: 0xff8800 })
      );
      gazeSphere.position.set(gazeX, gazeY, gazeZ);
      scene.add(gazeSphere);
    } catch (e) { /* no cameras.json, use defaults */ }
  }

  loadFromURL(splatUrl);
  setupCamera(splatUrl);

  // --- Render loop ---
  renderer.setAnimationLoop(() => {
    controls.update();
    renderer.render(scene, camera);
  });
</script>

</body>
</html>
